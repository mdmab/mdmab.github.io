<!DOCTYPE html>
<html>
    <head>
        <title>Portfolio</title>
    </head>
    <body>
        <div onclick="handleClick()" id="greet">
            Hey there
        </div>
        <script>
            let value = "Hey there";

            function handleClick() {
                value = value + value;
                document.getElementById("greet").innerText = value;
            }
        </script>
    </body>
</html>
